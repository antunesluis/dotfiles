# import = ["~/.config/alacritty-theme/themes/nightfox.toml"]
# import = ["~/.config/alacritty-theme/themes/midnight-haze.toml"]
# import = ["~/.config/alacritty-theme/themes/campbell.toml"]
import = ["~/.config/alacritty-theme/themes/kanagawa_wave.toml"]
#import = ["~/.config/alacritty-theme/themes/solarized-osaka_night.toml"]


shell = "/bin/zsh"

[env]
TERM="xterm-256color"
[font]
size = 12.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 1

[window]
    decorations = "Full"
    opacity = 0.95
    dynamic_title = false
    decorations_theme_variant = "Dark"
    class = { instance="Alacritty", general="Alacritty"}
    dynamic_padding = true
    title = "Alacritty"
    dimensions = { columns = 128, lines = 38 }
    padding = { x = 5, y = 3}

#[colors]
#    draw_bold_text_with_bright_colors=true
#    primary = {foreground="#ffffff", background="#000000", bright_foreground="#e63048"}

[selection]
    save_to_clipboard=true

[cursor]
    style={shape="Beam", blinking="Always"}
    blink_interval=450
